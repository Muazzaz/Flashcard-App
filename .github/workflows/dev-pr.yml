name: Name DEV - PR Preview Deployment

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop

env:
  PROJECT_NAME: name-${{ github.event.pull_request.number }}

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Create vercel.json
        run: |
          cat > vercel.json << EOF
          {
            "framework": "nextjs",
            "devCommand": null,
            "installCommand": "pnpm install",
            "buildCommand": "pnpm -w run build:website",
            "outputDirectory": ".next",
            "rootDirectory": "apps/pagifye-website",
            "directoryListing": false,
            "nodeVersion": "22.x"
          }
          EOF

      - name: Deploy and Configure Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
        run: |
          PREVIEW_URL="${{ env.PROJECT_NAME }}.vercel.app"
          vercel link --project ${{ env.PROJECT_NAME }} --yes --token=$VERCEL_TOKEN
          # Set rootDirectory in project settings
          curl -X PATCH "https://api.vercel.com/v9/projects/${{ env.PROJECT_NAME }}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory": "apps/pagifye-website"}'
          sleep 5
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          vercel alias set $DEPLOYMENT_URL $PREVIEW_URL --token=$VERCEL_TOKEN
          echo "deployment_url=https://$PREVIEW_URL" >> $GITHUB_ENV
          # Disable Authorization Protection
          curl -X PATCH "https://api.vercel.com/v9/projects/${{ env.PROJECT_NAME }}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"ssoProtection": null}'

      - name: Comment PR
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Preview deployed at: ${process.env.deployment_url}`
            })

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Setup and cleanup Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel@latest
          vercel remove ${{ env.PROJECT_NAME }} --token=$VERCEL_TOKEN --yes