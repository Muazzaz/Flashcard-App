name: Name DEV - Frontend Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
  GIT_COMMIT_EMAIL: ${{ secrets.GIT_COMMIT_EMAIL }}
  GIT_COMMIT_NAME: ${{ secrets.GIT_COMMIT_NAME }}

permissions:
  contents: read

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/pagifye-website/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'turbo.json'
      - 'tsconfig.json'

jobs:
  frontend-staging-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Override Git Author locally for Vercel bypass
        run: |
          git config user.email "${{ env.GIT_COMMIT_EMAIL }}"
          git config user.name "${{ env.GIT_COMMIT_NAME }}"
          git commit --amend --no-edit --reset-author --allow-empty
      
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm' 


      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest
        
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}